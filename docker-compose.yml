version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: aitaskmanager-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - JwtSettings__Secret=${JWT_SECRET:?JWT_SECRET must be set}
      - JwtSettings__Issuer=AITaskManager.API
      - JwtSettings__Audience=AITaskManager.Clients
      - JwtSettings__ExpiryMinutes=60
      - OpenAI__ApiKey=${OPENAI_API_KEY:-}
      - OpenAI__Model=gpt-4o-mini
    networks:
      - aitaskmanager
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Optional: swap in-memory repos for real PostgreSQL ──────────────────────
